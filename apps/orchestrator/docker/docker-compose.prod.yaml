name: anchor-orchestrator-prod
services:
  postgres:
    image: postgres:18.2
    container_name: anchor-orchestrator-prod-postgres
    restart: unless-stopped
    networks:
      - anchor-orchestrator-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      retries: 5
      start_period: 10s

  pgweb:
    container_name: anchor-orchestrator-prod-pgweb
    restart: always
    image: sosedoff/pgweb
    ports:
      - '8081:8081'
    networks:
      - anchor-orchestrator-prod
    environment:
      PGWEB_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    container_name: anchor-orchestrator-prod-playwright
    restart: unless-stopped
    ipc: host
    networks:
      - anchor-orchestrator-prod
    command: npx playwright@1.60.0 run-server --port 3200 --host 0.0.0.0
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'require("net").connect({port:3200,timeout:2000},()=>process.exit(0)).on("error",()=>process.exit(1))'
        ]
      interval: 10s
      retries: 5
      start_period: 10s

  sveltekit:
    build:
      context: ../../..
      dockerfile: apps/orchestrator/docker/Dockerfile
    container_name: anchor-orchestrator-prod-sveltekit
    restart: unless-stopped
    networks:
      - anchor-orchestrator-prod
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${PORT:-3001}:3000'
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_ORIGIN: ${APP_ORIGIN:-http://sveltekit:3000}
      PLAYWRIGHT_SERVER_URL: ${PLAYWRIGHT_SERVER_URL:-ws://playwright:3200/}
    depends_on:
      postgres:
        condition: service_healthy
      playwright:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:3000/healthcheck']
      interval: 30s
      retries: 3
      start_period: 30s

networks:
  anchor-orchestrator-prod:

volumes:
  postgres_data:
